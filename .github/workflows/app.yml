name: App

on:
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Write key (Debug Keystore)
        # 改为使用debug keystore，不再需要secret
        run: |
          echo "使用Android Debug Keystore"
          # 创建signing.properties使用debug配置
          echo "KEYSTORE_PASSWORD=android" > signing.properties
          echo "KEYSTORE_ALIAS=androiddebugkey" >> signing.properties
          echo "KEYSTORE_ALIAS_PASSWORD=android" >> signing.properties
          echo "KEYSTORE_FILE=$ANDROID_HOME/debug.keystore" >> signing.properties
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          dependency-graph: generate-and-submit
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"
      - name: Build with Gradle
        id: buildWithGradle
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          echo 'android.sdk.channel=3' >> gradle.properties
          echo 'android.native.buildOutput=verbose' >> gradle.properties
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          # 改为构建debug版本（或仍构建release但使用debug签名）
          ./gradlew :manager:assembleDebug
          # 修改文件路径匹配debug输出
          releaseName=`ls manager/build/outputs/apk/debug/shizuku*-v*-debug.apk | awk -F '(/|-debug.apk)' '{print $6}'` && echo "releaseName=$releaseName" >> $GITHUB_OUTPUT
      - name: Upload release
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.releaseName }}
          path: "manager/build/outputs"
          compression-level: 9
