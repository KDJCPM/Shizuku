
name: Build Android Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        java-version: '17'

    - name: Set up Android SDK
      uses: react-native-community/android-sdk@v1.0.0
      with:
        sdk-version: '30.0.3'

    - name: Build Debug APK
      run: ./gradlew assembleDebug
